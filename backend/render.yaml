# Render.com Infrastructure-as-Code
# This file tells Render.com exactly how to deploy the Metro Cardz backend.
# It defines the web service. The worker is defined separately in Procfile.
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Web Service (FastAPI) ─────────────────────────────────────────────────
  - type: web
    name: metrocardz-api
    runtime: python
    region: singapore           # Closest to India for low latency
    plan: free                  # Render free tier — upgrade to starter ($7/mo) for no sleep
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: gunicorn app.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    rootDir: backend            # Repo root → backend subdirectory
    healthCheckPath: /health    # Render pings this to verify the service is up

    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      # The following must be set manually in Render dashboard (they contain secrets)
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://metrocardz.in
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: MSG91_API_KEY
        sync: false
      - key: AISENSY_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"

  # ── Worker Service (Celery) ───────────────────────────────────────────────
  # NOTE: On free tier, use GitHub Actions cron instead of this worker.
  # Uncomment and use a paid plan ($7/mo) if you need persistent workers.
  #
  # - type: worker
  #   name: metrocardz-worker
  #   runtime: python
  #   region: singapore
  #   plan: starter
  #   buildCommand: pip install -r requirements.txt
  #   startCommand: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
  #   rootDir: backend
  #   envVars:
  #     - fromGroup: metrocardz-secrets
