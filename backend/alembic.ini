# Alembic Configuration
# Metro Cardz — Database Migration Tool
# Run: alembic upgrade head (to apply all migrations)
# Run: alembic revision --autogenerate -m "description" (to create a new migration)

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# Use DATABASE_URL env var (no hardcoded credentials)
sqlalchemy.url = %(DATABASE_URL)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
