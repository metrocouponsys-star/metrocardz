name: Keep Render Alive

# Pings the backend /health endpoint every 14 minutes so Render's free tier
# never sleeps. Render sleeps after 15 minutes of inactivity.
on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:   # also allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend Health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://metrocardz-api.onrender.com/health)
          echo "Backend responded with HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "WARNING: Backend returned $STATUS — may be sleeping or crashed"
          fi
