name: Deploy Metro Cardz to Hostinger

# -------------------------------------------------------
# Triggers
# -------------------------------------------------------
on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy to which environment?'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

# -------------------------------------------------------
# Prevent concurrent deployments
# -------------------------------------------------------
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# -------------------------------------------------------
# Jobs
# -------------------------------------------------------
jobs:
  # ---------------------------------------------------
  # Job 1: Quality Checks (Lint + Type Check)
  # ---------------------------------------------------
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit
        continue-on-error: true   # Don't fail build on type warnings

      - name: Lint check
        run: npm run lint
        continue-on-error: true

  # ---------------------------------------------------
  # Job 2: Build
  # ---------------------------------------------------
  build:
    name: Build Production Bundle
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create production .env
        run: |
          cat > .env.production.local << EOF
          NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL || 'https://metrocardz-api.onrender.com' }}
          NEXT_PUBLIC_USE_MOCK_DATA=${{ secrets.NEXT_PUBLIC_USE_MOCK_DATA || 'false' }}
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://dyzjsykvziquqsadnqzu.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_NAME=Metro Cardz
          NEXT_PUBLIC_APP_VERSION=${{ github.ref_name }}
          NEXT_PUBLIC_APP_ENV=production
          NEXT_PUBLIC_BASE_URL=https://metrocardz.in
          NEXT_PUBLIC_ENABLE_SENTRY=${{ secrets.NEXT_PUBLIC_ENABLE_SENTRY || 'false' }}
          NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN || '' }}
          NEXT_PUBLIC_ENABLE_ANALYTICS=${{ secrets.NEXT_PUBLIC_ENABLE_ANALYTICS || 'false' }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID || '' }}
          EOF

      - name: Build (Next.js static export)
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== Build Output ==="
          ls -la out/
          echo "=== index.html exists ==="
          test -f out/index.html && echo "✅ index.html present" || (echo "❌ index.html missing!" && exit 1)
          echo "=== .htaccess exists ==="
          test -f out/.htaccess && echo "✅ .htaccess present" || echo "⚠️  .htaccess missing — check public/ directory"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrocardz-dist-${{ github.sha }}
          path: app/out/
          retention-days: 7

  # ---------------------------------------------------
  # Job 3: Deploy to Hostinger via FTP
  # ---------------------------------------------------
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://metrocardz.in

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: metrocardz-dist-${{ github.sha }}
          path: ./dist

      - name: Verify downloaded artifact
        run: |
          echo "=== Files to deploy ==="
          find ./dist -type f | head -30
          echo "Total files: $(find ./dist -type f | wc -l)"

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: public_html/
          protocol: ftps
          port: 21
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/*.map

      - name: Purge Cloudflare Cache
        if: ${{ secrets.CLOUDFLARE_ZONE_ID != '' }}
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://metrocardz.in/","https://metrocardz.in/index.html"]}' \
            | jq .
          echo "✅ Cloudflare cache purged"

      - name: Smoke test deployment
        run: |
          echo "Waiting 15 seconds for deployment to propagate..."
          sleep 15
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://metrocardz.in || echo "000")
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "301" ] || [ "$HTTP_STATUS" = "302" ]; then
            echo "✅ Site is reachable (status $HTTP_STATUS)"
          else
            echo "⚠️  Unexpected status: $HTTP_STATUS — please check manually"
          fi

      - name: Notify deployment success
        if: success()
        run: |
          echo "🚀 Metro Cardz deployed successfully!"
          echo "URL: https://metrocardz.in"
          echo "Commit: ${{ github.sha }}"
          echo "Deployed by: ${{ github.actor }}"
          echo "Time: $(date -u)"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment FAILED!"
          echo "Commit: ${{ github.sha }}"
          echo "Check the FTP Deploy step above for details."
